<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Safety Game Pro – SGBH</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --sg-green: #00756a; /* Verde do Logotipo */
      --sg-dark: #073b34;
      --cor-certo: #2ecc71;
      --cor-errado: #d93025;
      --cor-bronze: #cd7f32;
      --cor-prata: #9ca3af;
      --cor-ouro: #fbbf24;
      --cor-diamante: #22d3ee;
      --transition: all 0.3s ease;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      min-height: 100vh;
      background-color: var(--sg-green); /* Fundo do site igual ao logo */
      display: flex; align-items: center; justify-content: center;
      font-family: 'Rajdhani', sans-serif; color: var(--sg-dark);
      padding: 10px; overflow: hidden;
    }

    #sg-root {
      width: 100%; max-width: 500px; height: 860px;
      background: #ffffff; border-radius: 35px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 30px 60px rgba(0,0,0,0.3);
      position: relative; overflow: hidden;
      display: flex; flex-direction: column;
    }

    /* CABEÇALHO AJUSTADO */
    .topo {
      display: flex; align-items: center; justify-content: space-between;
      padding: 15px 25px; border-bottom: 2px solid #f4f7f6; background: #fff; z-index: 10;
    }
    .topo-esquerda { display: flex; align-items: center; gap: 10px; }
    .topo-esquerda img { height: 35px; }
    .topo-esquerda .tit { font-family: 'Orbitron'; font-size: 15px; color: var(--sg-green); font-weight: 900; letter-spacing: 1px; }

    .lang-toggle { display: flex; gap: 10px; }
    .lang-btn { font-size: 22px; cursor: pointer; border: none; background: none; transition: 0.3s; filter: grayscale(1) opacity(0.3); }
    .lang-btn.active { filter: grayscale(0) opacity(1); transform: scale(1.2); }

    .grid-bg { position: absolute; inset: 0; background-image: linear-gradient(rgba(0,117,106,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(0,117,106,0.04) 1px, transparent 1px); background-size: 30px 30px; pointer-events: none; }

    .tela { padding: 15px 30px; flex: 1; display: flex; flex-direction: column; position: relative; z-index: 1; animation: fadeIn 0.4s ease-out; overflow-y: auto; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* TEXTO VITAL */
    .frase-vital { text-align: center; font-size: 17px; line-height: 1.5; margin: 15px 0; font-weight: 500; color: #444; }
    .frase-vital b { color: var(--sg-green); font-weight: 700; }
    .slogan-final { display: block; margin-top: 10px; font-family: 'Orbitron'; font-weight: 900; color: var(--sg-green); font-size: 15px; }

    .campo-nome {
      width: 100%; padding: 16px 25px; border-radius: 50px; border: 2px solid #e0e7e5;
      background: #f9fbfb; color: var(--sg-dark); font-family: 'Rajdhani';
      font-size: 18px; text-align: center; outline: none; transition: var(--transition);
      font-weight: 600; box-shadow: 0 4px 10px rgba(0,0,0,0.03); margin-bottom: 10px;
    }
    .campo-nome:focus { border-color: var(--sg-green); background: #fff; }

    .personagem-container { text-align: center; margin: 5px 0; }
    .personagem-img { width: 140px; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1)); animation: flutuar 3s ease-in-out infinite; }
    @keyframes flutuar { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

    /* RODAPÉ LOGO SGBH2 */
    .rodape-home { margin-top: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; border-top: 1px solid #f0f4f3; background: #fafafa; }
    .rodape-home img { width: 100%; max-width: 280px; height: auto; }

    /* HUD JOGO */
    .badge { display: inline-block; padding: 6px 16px; border-radius: 50px; font-family: 'Orbitron'; font-size: 11px; font-weight: 900; color: #fff; text-transform: uppercase; margin-bottom: 10px; }
    .badge-bronze { background: var(--cor-bronze); }
    .badge-prata { background: var(--cor-prata); }
    .badge-ouro { background: var(--cor-ouro); }
    .badge-diamante { background: var(--cor-diamante); box-shadow: 0 0 15px var(--cor-diamante); }

    .hud-carreira { display: flex; justify-content: space-between; gap: 5px; margin-bottom: 10px; }
    .hud-box { background: #f0f4f3; padding: 10px; border-radius: 12px; text-align: center; flex: 1; border: 1px solid rgba(0,0,0,0.05); }
    .hud-label { font-size: 8px; font-weight: 700; color: var(--sg-green); display: block; }
    .hud-val { font-family: 'Orbitron'; font-size: 12px; }

    .pergunta-card { background: #f9fbfb; border-radius: 25px; padding: 25px; text-align: center; border: 1px solid rgba(0,117,106,0.1); margin-bottom: 15px; min-height: 150px; display: flex; flex-direction: column; justify-content: center; }
    .pergunta-texto { font-size: 17px; font-weight: 700; line-height: 1.4; }

    .opcoes-grid { display: grid; gap: 8px; }
    .btn-opcao { background: #fff; border: 1px solid rgba(0,117,106,0.2); padding: 14px; border-radius: 15px; cursor: pointer; text-align: left; font-size: 15px; font-weight: 600; display: flex; align-items: center; transition: 0.2s; width: 100%; }
    .btn-opcao.certo { background: var(--cor-certo) !important; color: #fff; border-color: #27ae60; }
    .btn-opcao.errado { background: var(--cor-errado) !important; color: #fff; border-color: #c0392b; }
    .letra { width: 24px; height: 24px; background: var(--sg-green); color: #fff; border-radius: 6px; display: flex; align-items: center; justify-content: center; margin-right: 12px; font-family: 'Orbitron'; font-size: 10px; flex-shrink: 0; }

    .btn-principal { width: 100%; padding: 18px; border-radius: 50px; border: none; background: var(--sg-green); color: #fff; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; margin-top: 10px; text-transform: uppercase; }
    .btn-principal:disabled { background: #ccc; cursor: not-allowed; }
    .btn-secundario { background: transparent; border: 2px solid var(--sg-green); color: var(--sg-green); font-size: 12px; margin-top: 5px; }

    /* RANKING NOMES ESQUERDA, PONTOS DIREITA */
    .ranking-lista { width: 100%; margin-top: 5px; }
    .ranking-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: #f9fbfb; margin-bottom: 6px; border-radius: 15px; border: 1px solid rgba(0,0,0,0.05); font-weight: 700; }
    .rk-nome { text-align: left; flex: 1; font-size: 15px; }
    .rk-score { text-align: right; font-family: 'Orbitron'; color: var(--sg-green); }

    .timer-barra { height: 5px; background: var(--sg-green); width: 100%; transition: width 0.1s linear; margin-bottom: 10px; border-radius: 10px; }
    .dica-box { margin-top: 10px; padding: 15px; border-radius: 15px; font-size: 13px; background: #eef2f1; border-left: 5px solid var(--sg-green); line-height: 1.4; }
  </style>
</head>
<body>

<div id="sg-root">
  <div class="topo">
    <div class="topo-esquerda">
        <img src="logo.png" alt="SGBH" onerror="this.style.visibility='hidden'">
        <div class="tit">SAFETY GAME</div>
    </div>
    <div class="lang-toggle">
        <button class="lang-btn" id="btn-pt" onclick="setLang('pt')">🇧🇷</button>
        <button class="lang-btn" id="btn-en" onclick="setLang('en')">🇺🇸</button>
    </div>
  </div>
  <div class="grid-bg"></div>
  <div id="app" style="display: contents;"></div>
</div>

<script>
  // TRADUÇÕES
  const I18N = {
    pt: {
      welcome: `"Olá! Sou o <b>Vital</b>. Vou guiar você nesta jornada! Mostre seu conhecimento em <b>segurança</b>, conquiste o selo <b>DIAMANTE</b> e torne-se um <b>Agente Oficial</b>. Vamos começar?<br><span class="slogan-final">Afinal, SEGURANÇA É VITAL!"</span>`,
      placeholder: "Digite seu Nome Completo",
      btnStart: "Iniciar",
      btnRank: "Top 5 Agentes do Ano",
      rankTit: "AGENTES DE SEGURANÇA DO ANO",
      btnBack: "Voltar",
      hudDegrau: "DEGRAU",
      hudQ: "QUESTÃO",
      hudVidas: "VIDAS",
      btnNext: "Avançar",
      msgCerto: "EXCELENTE!",
      msgSubiu: "Você atingiu a meta e subiu para:",
      btnFase: "Iniciar Nível ",
      msgErro: "REVISÃO NECESSÁRIA",
      msgFalha: "Você não atingiu os 70% de acertos.<br>Perdeu 1 vida.",
      btnRetry: "Repetir Nível ",
      finalTit: "AGENTE DIAMANTE",
      finalSub: "Parabéns Agente! Você concluiu a trilha.",
      btnMenu: "Início"
    },
    en: {
      welcome: `"Hi! I am <b>Vital</b>. I will guide you on this journey! Show your <b>safety</b> knowledge, win the <b>DIAMOND</b> seal and become an <b>Official Agent</b>. Shall we start?<br><span class="slogan-final">After all, SAFETY IS VITAL!"</span>`,
      placeholder: "Enter your Full Name",
      btnStart: "Start",
      btnRank: "Top 5 Agents of the Year",
      rankTit: "SAFETY AGENTS OF THE YEAR",
      btnBack: "Back",
      hudDegrau: "STEP",
      hudQ: "QUESTION",
      hudVidas: "LIVES",
      btnNext: "Next",
      msgCerto: "EXCELLENT!",
      msgSubiu: "You reached the goal and promoted to:",
      btnFase: "Start Level ",
      msgErro: "REVIEW NEEDED",
      msgFalha: "You did not reach 70% correct answers.<br>You lost 1 life.",
      btnRetry: "Retry Level ",
      finalTit: "DIAMOND AGENT",
      finalSub: "Congratulations Agent! You finished the trail.",
      btnMenu: "Home"
    }
  };

  // BANCO DE DADOS (10 questões de exemplo)
  const BANCO = [
    { cat: "NR-10", q_pt: "Qual a distância mínima de segurança para aproximação de redes de 13.8kV?", q_en: "What is the minimum safety distance for approaching 13.8kV networks?", opt_pt: ["0,50m", "1,20m", "3,00m", "5,00m"], opt_en: ["0.50m", "1.20m", "3.00m", "5.00m"], ok: 1, dica_pt: "Manter a distância padrão evita o risco de arco elétrico.", dica_en: "Standard distance prevents electric arc risk." },
    { cat: "NR-06", q_pt: "O que garante legalmente a eficácia de um EPI no Brasil?", q_en: "What legally guarantees the effectiveness of PPE in Brazil?", opt_pt: ["A marca", "O preço", "O CA (Certificado de Aprovação)", "A indicação"], opt_en: ["Brand", "Price", "Approval Certificate (CA)", "Suggestion"], ok: 2, dica_pt: "O CA é o registro obrigatório do Ministério do Trabalho.", dica_en: "CA is the mandatory registry from Labor Ministry." },
    { cat: "NR-35", q_pt: "A partir de qual altura o trabalho é considerado 'em altura'?", q_en: "From what height is work considered 'at height'?", opt_pt: ["1,0m", "1,5m", "2,0m", "5,0m"], opt_en: ["1.0m", "1.5m", "2.0m", "5.0m"], ok: 2, dica_pt: "A NR-35 define 2 metros como o limite de segurança.", dica_en: "NR-35 defines 2 meters as the safety limit." },
    { cat: "INCÊNDIO", q_pt: "Extintor de água é proibido em qual classe de fogo?", q_en: "Water extinguisher is forbidden in which fire class?", opt_pt: ["Classe A", "Classe B", "Classe C (Elétrico)", "Classe D"], opt_en: ["Class A", "Class B", "Class C (Electric)", "Class D"], ok: 2, dica_pt: "A água conduz eletricidade e causa choque.", dica_en: "Water conducts electricity and causes shock." },
    { cat: "NR-33", q_pt: "Quem monitora o trabalho de fora do espaço confinado?", q_en: "Who monitors work from outside a confined space?", opt_pt: ["Vigia", "Gerente", "Porteiro", "Fiscal"], opt_en: ["Watchman", "Manager", "Doorman", "Inspector"], ok: 0, dica_pt: "O vigia aciona o resgate e mantém comunicação.", dica_en: "The watchman triggers rescue and maintains communication." }
  ];

  const FASES_LABEL = { pt: ["Bronze", "Prata", "Ouro", "Diamante"], en: ["Bronze", "Silver", "Gold", "Diamond"] };
  const FASES_CSS = ["badge-bronze", "badge-prata", "badge-ouro", "badge-diamante"];

  let state = {
    lang: 'pt', tela: 'inicio', nome: '', faseIdx: 0, degrau: 1, perguntaNoDegrau: 1,
    questoesRodada: [], indexQuestaoLocal: 0, acertosFase: 0, respondido: false,
    escolha: null, pontosTotal: 0, timer: 15, timerInt: null, vidas: 3
  };

  function setLang(l) {
    state.lang = l;
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + l).classList.add('active');
    renderizar();
  }

  function carregar() {
    const s = JSON.parse(localStorage.getItem('sg_v6_final'));
    if(s) { state.vidas = s.v; state.nome = s.n || ""; }
    setLang('pt');
  }

  function salvar() {
    localStorage.setItem('sg_v6_final', JSON.stringify({ v: state.vidas, d: new Date().toLocaleDateString(), n: state.nome }));
  }

  function iniciar() {
    if(state.vidas <= 0) return alert(state.lang==='pt'?'Vidas esgotadas por hoje!':'Out of lives for today!');
    const n = document.getElementById('nomeIn').value.trim();
    if(!n) return alert(state.lang==='pt'?'Digite seu nome':'Enter your name');
    state.nome = n; salvar(); prepararFase();
  }

  function prepararFase() {
    state.questoesRodada = BANCO.sort(() => Math.random() - 0.5);
    state.degrau = 1; state.perguntaNoDegrau = 1; state.acertosFase = 0;
    state.indexQuestaoLocal = 0; state.respondido = false; state.tela = 'jogo';
    renderizar(); startTimer();
  }

  function startTimer() {
    state.timer = 15;
    clearInterval(state.timerInt);
    state.timerInt = setInterval(() => {
      if(!state.respondido) {
        state.timer -= 0.1;
        const b = document.querySelector('.timer-barra');
        if(b) b.style.width = (state.timer / 15) * 100 + '%';
        if(state.timer <= 0) resolver(null);
      }
    }, 100);
  }

  function resolver(idx) {
    if(state.respondido) return;
    state.respondido = true; state.escolha = idx;
    clearInterval(state.timerInt);
    const q = state.questoesRodada[state.indexQuestaoLocal];
    if(idx === q.ok) {
      state.acertosFase++;
      state.pontosTotal += 100 + Math.round(state.timer * 5);
    }
    renderizar();
  }

  function proxima() {
    if (state.perguntaNoDegrau < 10) state.perguntaNoDegrau++;
    else { state.perguntaNoDegrau = 1; state.degrau++; }
    state.indexQuestaoLocal++;
    // Meta de 10 p/ teste rápido, mude para 100 no real
    if(state.indexQuestaoLocal >= 10 || state.indexQuestaoLocal >= state.questoesRodada.length) {
      validarAprovacao();
    } else {
      state.respondido = false; state.escolha = null; renderizar(); startTimer();
    }
  }

  function validarAprovacao() {
    const media = (state.acertosFase / state.indexQuestaoLocal) * 100;
    if(media === 100) { state.vidas = 3; salvar(); }
    if(media >= 70) {
      if(state.faseIdx < 3) { state.faseIdx++; state.tela = 'avanco'; }
      else { finalizar(); }
    } else {
      state.vidas--; salvar(); state.tela = 'falha';
    }
    renderizar();
  }

  function finalizar() {
    state.tela = 'final';
    let rk = JSON.parse(localStorage.getItem('sg_colab_rank_v6')) || [];
    rk.push({ n: state.nome, p: state.pontosTotal });
    rk.sort((a,b) => b.p - a.p);
    localStorage.setItem('sg_colab_rank_v6', JSON.stringify(rk.slice(0,5)));
  }

  function renderizar() {
    const app = document.getElementById('app');
    const t = I18N[state.lang];
    const fNome = FASES_LABEL[state.lang][state.faseIdx];
    const fCss = FASES_CSS[state.faseIdx];

    if(state.tela === 'inicio') {
      app.innerHTML = `
        <div class="tela">
          <div class="personagem-container"><img src="vital.png" class="personagem-img"></div>
          <div class="frase-vital">${t.welcome}</div>
          <input type="text" id="nomeIn" class="campo-nome" placeholder="${t.placeholder}" value="${state.nome}">
          <button class="btn-principal" onclick="iniciar()" ${state.vidas <= 0 ? 'disabled' : ''}>${t.btnStart}</button>
          <button class="btn-principal btn-secundario" onclick="state.tela='ranking'; renderizar()">${t.btnRank}</button>
          <div class="rodape-home">
            <img src="sgbh2.jpg.jpg" alt="SGBH Logo">
          </div>
        </div>`;
    }

    else if(state.tela === 'ranking') {
      const lista = JSON.parse(localStorage.getItem('sg_colab_rank_v6')) || [];
      app.innerHTML = `
        <div class="tela">
          <h3 style="font-family:'Orbitron'; text-align:center; margin-bottom:20px; color:var(--sg-green)">${t.rankTit}</h3>
          <div class="ranking-lista">
            ${lista.map((r,i) => `<div class="ranking-item"><span class="rk-nome">${i+1}º ${r.n}</span><span class="rk-score">${r.p}</span></div>`).join('')}
          </div>
          <button class="btn-principal" onclick="state.tela='inicio'; renderizar()">${t.btnBack}</button>
        </div>`;
    }

    else if(state.tela === 'jogo') {
      const q = state.questoesRodada[state.indexQuestaoLocal];
      app.innerHTML = `
        <div class="tela">
          <div style="text-align:center"><span class="badge ${fCss}">${fNome}</span></div>
          <div class="hud-carreira">
            <div class="hud-box"><span class="hud-label">${t.hudDegrau}</span><span class="hud-val">${state.degrau}/10</span></div>
            <div class="hud-box"><span class="hud-label">${t.hudQ}</span><span class="hud-val">${state.perguntaNoDegrau}/10</span></div>
            <div class="hud-box"><span class="hud-label">${t.hudVidas}</span><span class="hud-val">${'❤️'.repeat(state.vidas)}</span></div>
          </div>
          <div class="timer-barra"></div>
          <div class="pergunta-card">
            <div class="pergunta-texto">${state.lang==='pt'?q.q_pt:q.q_en}</div>
          </div>
          <div class="opcoes-grid">
            ${(state.lang==='pt'?q.opt_pt:q.opt_en).map((o,i) => {
              let cl = state.respondido ? (i === q.ok ? 'certo' : (state.escolha === i ? 'errado' : '')) : '';
              return `<button class="btn-opcao ${cl}" onclick="resolver(${i})" ${state.respondido?'disabled':''}>
                <span class="letra">${String.fromCharCode(65+i)}</span> ${o}
              </button>`;
            }).join('')}
          </div>
          ${state.respondido ? `<div class="dica-box"><b>${state.lang==='pt'?'Dica:':'Tip:'}</b> ${state.lang==='pt'?q.dica_pt:q.dica_en}</div><button class="btn-principal" onclick="proxima()">${t.btnNext}</button>` : ''}
        </div>`;
    }

    else if(state.tela === 'avanco') {
      app.innerHTML = `
        <div class="tela" style="text-align:center; justify-content: center;">
          <h2 style="color:var(--sg-green)">${t.msgCerto}</h2>
          <p>${t.msgSubiu}</p>
          <h1 style="font-family:'Orbitron'; margin:20px 0">${fNome}</h1>
          <button class="btn-principal" onclick="prepararFase()">${t.btnFase}${fNome}</button>
        </div>`;
    }

    else if(state.tela === 'falha') {
      app.innerHTML = `
        <div class="tela" style="text-align:center; justify-content: center;">
          <h2 style="color:var(--cor-errado)">${t.msgErro}</h2>
          <p>${t.msgFalha}</p>
          <button class="btn-principal" onclick="state.vidas > 0 ? prepararFase() : location.reload()">${state.vidas > 0 ? t.btnRetry + fNome : t.btnBack}</button>
        </div>`;
    }

    else if(state.tela === 'final') {
      app.innerHTML = `
        <div class="tela" style="text-align:center; justify-content: center;">
          <h1 style="font-family:'Orbitron'; color:var(--cor-diamante)">${t.finalTit}</h1>
          <p>${t.finalSub}</p>
          <h1 style="font-size:50px; color:var(--sg-green); margin: 20px 0;">${state.pontosTotal}</h1>
          <button class="btn-principal" onclick="location.reload()">${t.btnMenu}</button>
        </div>`;
    }
  }

  carregar();
</script>
</body>
</html>
